name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 🔑 ADD THESE 3 LINES HERE TO FIX THE FAILURE:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web Application
        run: flutter build web --release --base-href "/trayck/"

      - name: Deploy Build Artifacts to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web